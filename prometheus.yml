global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Spring Boot Actuator — /actuator/prometheus
  - job_name: spring-backend
    static_configs:
      - targets:
          - spring:8888
    metrics_path: /actuator/prometheus

  # 호스트 CPU / 메모리 / 디스크
  - job_name: node-exporter
    static_configs:
      - targets:
          - hka-node-exporter:9100

  # Docker 컨테이너별 사용량
  - job_name: cadvisor
    static_configs:
      - targets:
          - hka-cadvisor:8080

  # Prometheus 자기 자신
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
